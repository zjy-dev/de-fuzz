compiler:
    # Cross-compiler for riscv64 (GCC 15.2)
    path: "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc/xgcc"

    # gcovr execution path - should be the source root directory
    gcovr_exec_path: "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu"

    source_parent_path: "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile"

    # gcovr command template
    gcovr_command: 'gcovr --exclude ".*\.(h|hpp|hxx)$" --gcov-executable "gcov-14 --demangled-names" -r ..'

    # Compiler flags for RISC-V 64 cross-compilation
    cflags:
        - "-fstack-protector-strong"
        - "-O0"
        - "--sysroot=/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/install-riscv64-unknown-linux-gnu/riscv64-unknown-linux-gnu/libc"
        - "-B/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc"
        - "-B/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/install-riscv64-unknown-linux-gnu/lib/gcc/riscv64-unknown-linux-gnu/15.2.0"
        - "-L/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/install-riscv64-unknown-linux-gnu/riscv64-unknown-linux-gnu/lib"

    fuzz:
        output_root_dir: "fuzz_out"
        max_iterations: 256
        max_new_seeds: 1
        max_test_cases: 0
        function_template: "initial_seeds/riscv64/canary/function_template.c"
        base_prompt_dir: "prompts/base"
        timeout: 30
        use_qemu: true
        qemu_path: "qemu-riscv64"
        qemu_sysroot: "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/install-riscv64-unknown-linux-gnu/riscv64-unknown-linux-gnu/libc"
        cfg_file_paths:
            - "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc/cfgexpand.cc.015t.cfg"
            - "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc/function.cc.015t.cfg"
            - "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc/targhooks.cc.015t.cfg"
            - "/root/project/de-fuzz/target_compilers/gcc-v15.2.0-riscv64-cross-compile/build-riscv64-unknown-linux-gnu/gcc-final-build/gcc/toplev.cc.015t.cfg"
        max_constraint_retries: 8
        weight_decay_factor: 0.8

    oracle:
        type: "canary"
        options:
            max_buffer_size: 1024
            default_buf_size: 64
            negative_cflags:
                - "-fno-stack-protector"

# Stack Canary (Stack Protector) related core functions for RISC-V 64
# RISC-V 使用 targhooks.cc 的默认实现（与 MIPS 类似），无架构特定函数
#
# 注意: 仅 cfgexpand.cc 有 CFG dump 和覆盖率插桩，
#       其余文件的函数作为注释保留，待多文件 CFG 分析支持后启用

targets:
    # cfgexpand.cc - 栈保护核心逻辑（变量分类、冲突分析、prologue生成）
    - file: "gcc/gcc/cfgexpand.cc"
      functions:
          - "stack_protect_classify_type"       # line 2203
          - "stack_protect_decl_phase"          # line 2256
          - "stack_protect_decl_phase_1"        # line 2290
          - "stack_protect_decl_phase_2"        # line 2296
          - "add_stack_protection_conflicts"    # line 2322
          - "create_stack_guard"                # line 2351
          - "stack_protect_return_slot_p"       # line 2435
          - "defer_stack_allocation"            # line 1968
          - "expand_used_vars"                  # line 2457
          - "stack_protect_prologue"            # line 6920

    # function.cc - epilogue 及参数处理
    - file: "gcc/gcc/function.cc"
      functions:
          - "stack_protect_epilogue"            # line 5042
          - "assign_parm_adjust_stack_rtl"      # line 2836

    # targhooks.cc - 默认 target hook 实现（RISC-V 使用默认实现）
    - file: "gcc/gcc/targhooks.cc"
      functions:
          - "default_stack_protect_guard"           # line 919
          - "default_external_stack_protect_fail"   # line 952
          - "default_hidden_stack_protect_fail"     # line 979

    # toplev.cc - 编译选项处理（stack-protector 相关选项解析）
    - file: "gcc/gcc/toplev.cc"
      functions:
          - "process_options"                       # line 1563
