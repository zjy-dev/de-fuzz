<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1B5E20;
  padding: 12pt 24pt;
  display: flex;
  align-items: center;
}
.header h1 {
  color: #ffffff;
  font-size: 22pt;
  margin: 0;
}
.content {
  flex: 1;
  padding: 16pt 30pt;
  display: flex;
  flex-direction: column;
}
h2 {
  color: #1B5E20;
  font-size: 15pt;
  margin: 0 0 10pt 14pt;
}
.section-title {
  display: flex;
  align-items: center;
}
.title-bar {
  width: 4pt;
  height: 15pt;
  background: #FFC107;
  margin-right: 10pt;
}
.timeline {
  display: flex;
  flex-direction: column;
  gap: 6pt;
}
.phase {
  display: flex;
  align-items: center;
  gap: 12pt;
}
.phase-time {
  background: #1B5E20;
  border-radius: 4pt;
  padding: 4pt 8pt;
  min-width: 50pt;
}
.phase-time p {
  color: #ffffff;
  font-size: 10pt;
  margin: 0;
  text-align: center;
}
.phase-bar {
  flex: 1;
  border-radius: 4pt;
  padding: 6pt 10pt;
}
.phase-bar p {
  color: #ffffff;
  font-size: 10pt;
  margin: 0;
}
.phase-1 { background: #2E7D32; }
.phase-2 { background: #388E3C; }
.phase-3 { background: #43A047; }
.phase-4 { background: #4CAF50; }
.phase-5 { background: #66BB6A; }
.current {
  background: #FFC107;
  border-radius: 4pt;
  margin-top: 10pt;
  padding: 8pt 12pt;
}
.current p {
  color: #333333;
  font-size: 11pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>4. 进度安排</h1>
</div>
<div class="content">
  <div class="section-title"><div class="title-bar"></div><h2>研二下学期工作计划 (2026.3 - 2026.7)</h2></div>
  <div class="timeline">
    <div class="phase">
      <div class="phase-time"><p>3月</p></div>
      <div class="phase-bar phase-1"><p>完善系统实现，扩展 FORTIFY_SOURCE 防御策略支持</p></div>
    </div>
    <div class="phase">
      <div class="phase-time"><p>4月</p></div>
      <div class="phase-bar phase-2"><p>大规模实验：多架构、多版本 GCC 全面测试</p></div>
    </div>
    <div class="phase">
      <div class="phase-time"><p>5月</p></div>
      <div class="phase-bar phase-3"><p>漏洞分析与报告，整理实验数据，撰写论文初稿</p></div>
    </div>
    <div class="phase">
      <div class="phase-time"><p>6月</p></div>
      <div class="phase-bar phase-4"><p>论文修改完善，投稿准备</p></div>
    </div>
    <div class="phase">
      <div class="phase-time"><p>7月</p></div>
      <div class="phase-bar phase-5"><p>毕业论文撰写，答辩准备</p></div>
    </div>
  </div>
  <div class="current">
    <p>当前进度：研二上学期结束 (2026.2.4)，已完成系统核心功能，复现 CVE-2023-4039</p>
  </div>
</div>
</body>
</html>
